---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/cvs/upload":
    post:
      summary: Upload a CV PDF file
      tags:
      - CVs
      parameters: []
      responses:
        '200':
          description: CV uploaded successfully
        '400':
          description: no file uploaded
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
        description: CV file in PDF format
  "/api/cvs/{id}":
    delete:
      summary: Delete a CV and its attached file
      tags:
      - CVs
      parameters:
      - name: id
        in: path
        required: true
        description: CV ID
        schema:
          type: string
      responses:
        '200':
          description: CV deleted successfully
        '404':
          description: CV not found
  "/api/cvs/{id}/extract_summary":
    get:
      summary: Extract structured summary from a CV PDF
      tags:
      - CVs
      parameters:
      - name: id
        in: path
        required: true
        description: CV ID
        schema:
          type: string
      responses:
        '200':
          description: Summary extracted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  email:
                    type: string
                  experiences:
                    type: array
                    items:
                      type: object
                      properties:
                        job_details:
                          type: string
                        period:
                          type: string
                  current_job:
                    type: object
                    nullable: true
                    properties:
                      job_details:
                        type: string
                      period:
                        type: string
                  total_experience_years:
                    type: string
                  skills:
                    type: string
        '404':
          description: CV not found
  "/api/cvs/{id}/extract_text":
    get:
      summary: Extract raw text from a CV PDF
      tags:
      - CVs
      parameters:
      - name: id
        in: path
        required: true
        description: CV ID
        schema:
          type: string
      responses:
        '200':
          description: Text extracted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
        '404':
          description: CV not found
  "/api/cvs/{id}/extract_sections":
    get:
      summary: Extract structured sections from a CV PDF
      tags:
      - CVs
      parameters:
      - name: id
        in: path
        required: true
        description: CV ID
        schema:
          type: string
      responses:
        '200':
          description: Sections extracted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  section_hint:
                    type: object
                    nullable: true
                    properties:
                      text:
                        type: string
                      font:
                        type: integer
                  font_id:
                    type: integer
                    nullable: true
                  section_blocks:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        text_nodes:
                          type: array
                          items:
                            type: object
                            properties:
                              text:
                                type: string
                              top:
                                type: integer
                              left:
                                type: integer
                              font:
                                type: integer
        '404':
          description: CV not found
  "/api/cvs/save_to_sheet":
    post:
      summary: Save extracted CV summary to Google Sheets
      tags:
      - CVs
      parameters: []
      responses:
        '200':
          description: Saved to Google Sheets successfully
          content:
            application/json:
              examples:
                success_example:
                  value:
                    message: Saved to Google Sheets successfully
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
        '422':
          description: Validation failed
          content:
            application/json:
              examples:
                invalid_job_example:
                  value:
                    error: Invalid job title
                invalid_sheet_example:
                  value:
                    error: Sheet does not exist.
              schema:
                type: object
                properties:
                  error:
                    type: string
                required:
                - error
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                summary:
                  type: object
                  required:
                  - name
                  - email
                  - total_experience_years
                  - applied_for
                  - sheet
                  properties:
                    name:
                      type: string
                      example: Maria Silaghi
                    email:
                      type: string
                      example: smaria.oana@yahoo.com
                    total_experience_years:
                      type: string
                      example: 2.5y
                    applied_for:
                      type: string
                      example: Internship
                      enum:
                      - Full Stack Software Engineer
                      - Internship
                      - QA
                    sheet:
                      type: string
                      example: Internship
                      description: The name of the sheet where the row should be saved
        required: true
  "/api/cvs/sheets":
    get:
      summary: List available sheets
      tags:
      - CVs
      responses:
        '200':
          description: Sheets listed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  sheets:
                    type: array
                    items:
                      type: string
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
