---
openapi: 3.0.1
info:
  title: API V1
  version: v1
paths:
  "/api/cvs/upload":
    post:
      summary: Upload a CV PDF file
      tags:
      - CVs
      parameters: []
      responses:
        '200':
          description: CV uploaded successfully
        '400':
          description: no file uploaded
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
        required: true
        description: CV file in PDF format
  "/api/cvs/{id}":
    delete:
      summary: Delete a CV and its attached file
      tags:
      - CVs
      parameters:
      - name: id
        in: path
        required: true
        description: CV ID
        schema:
          type: string
      responses:
        '200':
          description: CV deleted successfully
        '404':
          description: CV not found
  "/api/cvs/{id}/extract_text":
    get:
      summary: Extract raw text from an uploaded CV PDF
      tags:
      - CVs
      parameters:
      - name: id
        in: path
        required: true
        description: CV ID
        schema:
          type: string
      responses:
        '200':
          description: Text extracted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  email:
                    type: string
                  experiences:
                    type: array
                    items:
                      type: object
                      properties:
                        title:
                          type: string
                        company:
                          type: string
                        period:
                          type: string
                  current_job:
                    type: object
                    nullable: true
                    properties:
                      title:
                        type: string
                      company:
                        type: string
                      period:
                        type: string
                  total_experience_years:
                    type: number
                  skills:
                    type: array
                    items:
                      type: string
                  text:
                    type: string
        '404':
          description: CV not found
servers:
- url: http://{defaultHost}
  variables:
    defaultHost:
      default: localhost:3000
